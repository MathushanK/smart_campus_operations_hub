# Server Settings
server.port=8080
server.servlet.context-path=/api/v1
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.allowed-origins=${ALLOWED_ORIGINS:${app.frontend-url}}

# Database Configuration (Replace with your actual credentials)
spring.datasource.url=jdbc:mysql://localhost:3306/smart_campus_hub?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Mathu@1509
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Logging
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=DEBUG
logging.level.com.smartcampus.hub=DEBUG

spring.security.oauth2.client.registration.google.client-id=YOUR_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=email,profile


